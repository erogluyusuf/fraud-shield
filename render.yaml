services:
  # --- API Servisi ---
  - type: web
    name: fraud-api
    runtime: docker
    dockerContext: .
    dockerfilePath: ./backend/api/Dockerfile
    plan: free
    envVars:
      - key: RABBITMQ_HOST
        value: rabbitmq # Not: Render iç ağında servis adı kullanılır

  # --- Worker Servisi ---
  - type: worker
    name: fraud-worker
    runtime: docker
    dockerContext: .
    dockerfilePath: ./backend/worker/Dockerfile
    plan: free

  # --- Frontend (Statik Site olarak) ---
  - type: web
    name: fraud-frontend
    runtime: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    plan: free

# Not: Render'ın ücretsiz katmanı RabbitMQ ve Redis'i 
# "Yönetilen Servis" olarak Docker Compose gibi direkt ayağa kaldırmaz. 
# Bu servisleri Render'ın kendi Marketplace'inden manuel eklemek gerekir.
