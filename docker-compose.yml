services:
  # --- ALTYAPI SERVİSLERİ ---
  postgres:
    image: postgres:15-alpine
    container_name: fraud_postgres
    environment:
      POSTGRES_USER: fraud_user
      POSTGRES_PASSWORD: fraud_password
      POSTGRES_DB: fraud_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud_user -d fraud_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fraud_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fraud_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 5s
      timeout: 5s
      retries: 5

  # --- KENDİ MİKROSERVİSLERİMİZ ---
  api:
    build: ./backend/api
    container_name: fraud_api
    ports:
      - "8000:8000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  worker:
    build: ./backend/worker
    container_name: fraud_worker
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  mcp:
    build: ./backend/mcp
    container_name: fraud_mcp
    stdin_open: true # stdio iletişimi için
    tty: true
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: fraud_frontend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
